name = "travel-plan-data-worker"
main = "worker.js"
compatibility_date = "2026-05-06"

# Cloudflare Worker Variables and Secrets:
#
# Secret:
# APP_PASSWORD  写入密码
# GH_TOKEN      GitHub Personal Access Token
#
# Plaintext:
# DATA_PATH     data.json
# GH_BRANCH     main
# GH_OWNER      GitHub 用户名，例如 evanlliu
# GH_REPO       GitHub 仓库名，例如 travel-plan
