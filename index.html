<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Travel Plan Pro v2.0.0</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="page">
    <section class="top">
      <div class="panel title">
        <h1><span data-i18n="appTitle">行程计划 Pro</span><span class="ver">v2.0.0</span></h1>
        <p class="sub" data-i18n="subtitle">按日期分组的更清晰界面，支持 Excel 导入、在线编辑、链接预览和多设备同步。</p>
      </div>
      <div class="panel toolbar">
        <button class="primary" id="btnAdd" data-i18n="add">新增安排</button>
        <button id="btnImport" data-i18n="import">导入 Excel</button>
        <button id="btnTplZh" data-i18n="tplZh">中文模板</button>
        <button id="btnTplEn" data-i18n="tplEn">英文模板</button>
        <button id="btnPeople" data-i18n="peopleConfig">人员配置</button>
        <button id="btnRefresh" data-i18n="refresh">刷新同步</button>
        <input class="search" id="searchInput" data-i18n-placeholder="search" placeholder="搜索日期 / 内容 / 人员">
      </div>
    </section>

    <section class="stats">
      <div class="stat"><div data-i18n="days">天数</div><b id="statDays">0</b></div>
      <div class="stat"><div data-i18n="items">安排数</div><b id="statItems">0</b></div>
      <div class="stat"><div data-i18n="links">链接数</div><b id="statLinks">0</b></div>
      <div class="stat"><div data-i18n="people">参与人员</div><b id="statPeople">0</b></div>
    </section>

    <section class="status">
      <div><span class="dot" id="statusDot"></span><span id="statusText">Loading...</span></div>
      <div id="updatedText">-</div>
    </section>

    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" hidden>
    <section class="board" id="board"></section>
  </main>

  <button class="lang" id="btnLang">EN</button>

  <div class="mask" id="editMask">
    <div class="modal">
      <div class="modalHead">
        <h2 id="editTitle">新增安排</h2>
        <button data-close="editMask">✕</button>
      </div>
      <div class="modalBody">
        <input type="hidden" id="editId">
        <div class="grid">
          <div class="field">
            <label data-i18n="date">日期</label>
            <input type="date" id="editDate">
          </div>
          <div class="field">
            <label data-i18n="time">时间</label>
            <input type="time" id="editTime">
          </div>
          <div class="field">
            <label data-i18n="weekday">星期</label>
            <input id="editWeekday" readonly>
          </div>
          <div class="field">
            <label data-i18n="group">分组</label>
            <input id="editGroup" data-i18n-placeholder="groupPlaceholder" placeholder="例如：Plan 1">
          </div>
          <div class="field full">
            <label data-i18n="content">计划内容</label>
            <textarea id="editContent" data-i18n-placeholder="contentPlaceholder"></textarea>
          </div>
          <div class="field full">
            <label data-i18n="rednote">小红书链接</label>
            <textarea id="editLinks" data-i18n-placeholder="linksPlaceholder"></textarea>
            <div class="hint" data-i18n="linksHint">支持多个链接，每行一个；点击列表中的链接可弹窗预览。</div>
          </div>
          <div class="field full">
            <label data-i18n="people">参与人员</label>
            <div class="peoplePicker" id="peoplePicker">
              <button type="button" class="peopleToggle" id="peopleToggle">
                <span id="peopleSummary">请选择</span><span>▾</span>
              </button>
              <div class="peoplePanel" id="peoplePanel"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="modalFoot">
        <button data-close="editMask" data-i18n="cancel">取消</button>
        <button class="primary" id="btnSaveEdit" data-i18n="save">保存</button>
      </div>
    </div>
  </div>

  <div class="mask" id="peopleMask">
    <div class="modal smallModal">
      <div class="modalHead">
        <h2 data-i18n="peopleConfig">人员配置</h2>
        <button data-close="peopleMask">✕</button>
      </div>
      <div class="modalBody">
        <div class="field full">
          <label data-i18n="peopleList">人员列表</label>
          <textarea id="peopleText" class="peopleText"></textarea>
          <div class="hint" data-i18n="peopleHint">一行一个名字。</div>
        </div>
      </div>
      <div class="modalFoot">
        <button data-close="peopleMask" data-i18n="cancel">取消</button>
        <button class="primary" id="btnSavePeople" data-i18n="save">保存</button>
      </div>
    </div>
  </div>

  <div class="mask" id="viewerMask">
    <div class="modal viewer">
      <div class="modalHead">
        <h2 data-i18n="preview">链接预览</h2>
        <button data-close="viewerMask">✕</button>
      </div>
      <div class="viewerTip">
        <span data-i18n="iframeTip">如果无法显示，请新窗口打开。</span>
        <a id="viewerOpen" target="_blank" rel="noopener noreferrer" data-i18n="openNew">新窗口打开</a>
      </div>
      <iframe id="viewerFrame" referrerpolicy="no-referrer"></iframe>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
